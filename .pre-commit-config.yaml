default_install_hook_types:
  - pre-commit
  - commit-msg
  
repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []


  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: "v1.98.1"
    hooks:
      - id: terraform_docs
        name: Terraform docs
        description: >-
          Inserts documentation from main.tf, module usage, requirements, 
          resources, modules, inputs and outputs into README.md
        args:
          - --hook-config=--terraform-docs-version=v0.20.0
          - --hook-config=--path-to-file=README.md
          - --hook-config=--create-file-if-not-exist=true
          - --args=--config=.terraform-docs.yaml
        stages: [pre-commit]
      - id: terraform_fmt
        args: [--args=-write=true]
        stages: [pre-commit]
      - id: terraform_tflint
        args:
          - --hook-config=--delegate-chdir
        stages: [pre-commit]
      - id: terraform_trivy
        args: 
          - config . --severity CRITICAL
        stages: [pre-commit]
      - id: terraform_validate
        stages: [pre-commit]