default_install_hook_types:
  - pre-commit
  - commit-msg
  
repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  - repo: local
    hooks:
      # Copies the default .terraform-docs.yml to all the modules folders to keep consistency in documentation
      - id: copy-terraform-docs-config
        name: Copy terraform-docs config to module folders
        entry: >
          pwsh -NoProfile -Command "
          Get-ChildItem -Recurse -Include *.tf |
            Select-Object -ExpandProperty Directory |
            Sort-Object -Unique |
            Where-Object {
              $_ -notmatch '^\.$' -and
              $_ -notmatch '/test/'
            } |
            ForEach-Object {
              Copy-Item -Path ./.terraform-docs.yaml -Destination (Join-Path $_ '.terraform-docs.yaml') -Force
            }
          "
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: terraform-docs
        name: Generate Terraform docs
        entry: >
          pwsh -NoProfile -Command "
          Get-ChildItem -Recurse -Include *.tf |
            Select-Object -ExpandProperty Directory |
            Sort-Object -Unique |
            Where-Object {
              $_ -notmatch '/test/'
            } |
            ForEach-Object {
              & terraform-docs $_
            }
          "
        language: system
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: "v1.98.1"
    hooks:
      - id: terraform_fmt
        args: [--args=-write=true]
        stages: [pre-commit]
      - id: terraform_tflint
        args:
          - --hook-config=--delegate-chdir
        stages: [pre-commit]
      - id: terraform_trivy
        args: 
          - config . --severity CRITICAL
        stages: [pre-commit]
      - id: terraform_validate
        stages: [pre-commit]